<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Original Dove Farms Student Website | Sheila Tulok Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&amp;family=Manrope:wght@500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/original-preview.css">
</head>
<body>
  <a class="skip-link" href="#originalWebsite">Skip to the original website preview</a>

  <header class="preview-toolbar" id="previewToolbar">
    <div class="preview-identity">
      <img src="assets/dove-farms-logo-original.png" alt="Dove Farms">
      <div>
        <p>Sheila Tulok portfolio</p>
        <h1>Original student website preview</h1>
      </div>
    </div>

    <p class="preview-context">College assignment · fictional winery</p>

    <nav class="preview-actions" aria-label="Portfolio preview navigation">
      <a href="../../html/portfolio.html">Back to Portfolio</a>
      <a href="../../html/index.html">Main Website</a>
      <a class="preview-primary" href="https://sessions-creative.com/sheila-tulok/dovefarms/index.html" target="_blank" rel="noopener noreferrer">Open Original <span aria-hidden="true">↗</span></a>
    </nav>
  </header>

  <main class="preview-frame-wrap">
    <iframe
      id="originalWebsite"
      src="https://sessions-creative.com/sheila-tulok/dovefarms/index.html"
      title="Original Dove Farms student website created by Sheila Tulok"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </main>

  <script>
    const toolbar = document.getElementById("previewToolbar");
    const setToolbarHeight = () => {
      document.documentElement.style.setProperty("--preview-toolbar-height", `${toolbar.offsetHeight}px`);
    };
    setToolbarHeight();
    new ResizeObserver(setToolbarHeight).observe(toolbar);
  </script>
</body>
</html>
