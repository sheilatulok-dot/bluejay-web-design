<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1.2" dy="2" stdDeviation="1.4" flood-color="#17304d" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="blue" x1="8" y1="8" x2="58" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6db7ff"/>
      <stop offset="0.55" stop-color="#2f86df"/>
      <stop offset="1" stop-color="#173e77"/>
    </linearGradient>
  </defs>

  <!-- Beak tip is the cursor hotspot at 4,4 -->
  <circle cx="4" cy="4" r="1.4" fill="#10243d" opacity="0.8"/>

  <g filter="url(#shadow)">
    <!-- beak -->
    <path d="M4 4 L22 13 L12 21 Z" fill="#111827"/>

    <!-- tail, drawn first so body overlaps -->
    <path d="M40 39 C49 43 57 51 61 60 C48 58 38 52 31 44 Z" fill="#1f6fc2"/>
    <path d="M43 44 C49 48 54 52 57 57" fill="none" stroke="#dff1ff" stroke-width="2" stroke-linecap="round" opacity=".85"/>

    <!-- crest -->
    <path d="M20 13 C23 6 29 3 36 4 C32 9 31 14 35 19 Z" fill="#174a8a"/>

    <!-- body -->
    <path d="M14 20 C18 10 32 9 43 16 C54 23 55 38 45 47 C35 56 19 53 12 41 C8 34 10 26 14 20 Z" fill="#eaf6ff"/>
    <path d="M16 24 C22 15 35 15 44 22 C51 28 51 39 43 45 C35 51 22 49 16 39 C13 34 13 29 16 24 Z" fill="#b9ddfb" opacity=".82"/>

    <!-- blue wing -->
    <path d="M18 29 C25 20 40 20 49 31 C41 34 30 39 20 43 C16 39 15 34 18 29 Z" fill="url(#blue)"/>
    <path d="M24 34 C31 31 38 30 45 31" fill="none" stroke="#f7fbff" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M26 39 C32 37 38 37 44 39" fill="none" stroke="#f7fbff" stroke-width="1.8" stroke-linecap="round" opacity=".85"/>
    <path d="M31 25 C35 28 37 32 37 37" fill="none" stroke="#173e77" stroke-width="1.4" stroke-linecap="round" opacity=".45"/>

    <!-- white face patch and head markings -->
    <path d="M16 18 C22 11 34 12 42 20 C34 18 25 19 17 25 Z" fill="#ffffff"/>
    <path d="M14 21 C23 16 33 17 42 23" fill="none" stroke="#10243d" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M20 26 C25 29 31 30 38 29" fill="none" stroke="#10243d" stroke-width="1.8" stroke-linecap="round" opacity=".8"/>

    <!-- eye -->
    <circle cx="20.5" cy="17.5" r="2.2" fill="#0f172a"/>
    <circle cx="21.2" cy="16.8" r=".65" fill="#ffffff"/>

    <!-- legs -->
    <path d="M27 47 L22 57 M34 47 L34 58" stroke="#17304d" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M18 58 H25 M31 59 H39" stroke="#17304d" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>
